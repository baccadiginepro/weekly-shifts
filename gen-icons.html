<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<a id="dl192" download="icon-192.png">Download 192</a><br>
<a id="dl512" download="icon-512.png">Download 512</a>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.15;
  ctx.fillStyle = '#0f3460';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.arcTo(s, 0, s, r, r);
  ctx.lineTo(s, s - r);
  ctx.arcTo(s, s, s - r, s, r);
  ctx.lineTo(r, s);
  ctx.arcTo(0, s, 0, s - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#3b82f6';
  const pad = s * 0.15;
  const tw = s - pad * 2;
  const th = s * 0.1;
  ctx.fillRect(pad, pad, tw, th);
  for (let i = 1; i <= 4; i++) {
    ctx.fillRect(pad, pad + th * 1.5 * i, tw, th * 0.8);
  }

  ctx.fillStyle = '#0ea5e9';
  ctx.font = `bold ${s * 0.18}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('📅', s / 2, s * 0.85);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

document.getElementById('dl192').href = document.getElementById('c192').toDataURL();
document.getElementById('dl512').href = document.getElementById('c512').toDataURL();
</script>
</body>
</html>
