<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f3460">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Gestione Turni</title>
  <link rel="manifest" href="./manifest.json?v=14">
  <link rel="stylesheet" href="./style.css?v=14">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>📅 Turni</h1>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm print-hide" id="btn-print">🖨 Stampa</button>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="tabs print-hide">
    <button class="tab-btn active" data-tab="calendar">Calendario</button>
    <button class="tab-btn" data-tab="hours">Ore</button>
    <button class="tab-btn" data-tab="settings">Impostazioni</button>
  </nav>

  <!-- MAIN -->
  <main>

    <!-- ===== CALENDARIO ===== -->
    <div class="view active" id="view-calendar">
      <div class="week-nav print-hide">
        <button class="btn btn-ghost btn-sm" id="btn-prev-week">‹ Prec.</button>
        <span class="week-label" id="week-label"></span>
        <button class="btn btn-ghost btn-sm" id="btn-today">Oggi</button>
        <button class="btn btn-ghost btn-sm" id="btn-next-week">Succ. ›</button>
        <button class="btn btn-ghost btn-sm" id="btn-copy-prev-week" title="Copia i turni dalla settimana precedente">↩ Copia sett. prec.</button>
      </div>
      <div id="week-label-print" style="display:none;text-align:center;font-weight:700;margin-bottom:8px"></div>

      <div class="alert-banner" id="coverage-alert"></div>
      <div id="calendar-table-wrapper"></div>
      <div id="print-tables"></div>
    </div>

    <!-- ===== ORE ===== -->
    <div class="view" id="view-hours">
      <div class="week-nav print-hide">
        <button class="btn btn-ghost btn-sm" id="btn-prev-week-h" onclick="prevWeek();renderHours()">‹ Prec.</button>
        <span class="week-label" id="week-label-h"></span>
        <button class="btn btn-ghost btn-sm" onclick="goToCurrentWeek();renderHours()">Oggi</button>
        <button class="btn btn-ghost btn-sm" id="btn-next-week-h" onclick="nextWeek();renderHours()">Succ. ›</button>
      </div>
      <div class="hours-grid" id="hours-grid"></div>
    </div>

    <!-- ===== IMPOSTAZIONI ===== -->
    <div class="view" id="view-settings">
      <div class="settings-grid">

        <!-- Lavoratori -->
        <div class="card">
          <div class="card-title">👷 Lavoratori</div>
          <div class="add-form">
            <div class="form-group">
              <input type="text" id="new-worker-name" placeholder="Nome lavoratore..." autocomplete="off">
            </div>
            <button class="btn btn-primary" id="btn-add-worker">+</button>
          </div>
          <div id="workers-list"></div>
        </div>

        <!-- Reparti -->
        <div class="card">
          <div class="card-title">🏭 Reparti</div>
          <div class="add-form">
            <div class="form-group">
              <input type="text" id="new-dept-name" placeholder="Nome reparto..." autocomplete="off">
            </div>
            <input type="color" id="new-dept-color" style="width:42px;flex-shrink:0">
            <button class="btn btn-primary" id="btn-add-dept">+</button>
          </div>
          <div id="depts-list"></div>
        </div>

      </div>
    </div>

  </main>

  <!-- ===== MODAL TURNO ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:16px">
        <div class="modal-title" style="margin:0" id="modal-title">Imposta turno</div>
        <button class="btn btn-ghost btn-sm" id="modal-copy-prev-day" title="Copia tutti i turni del giorno precedente">↩ Da ieri</button>
      </div>

      <div class="form-group">
        <label>Reparti</label>
        <div id="modal-dept-chips" style="display:flex;flex-wrap:wrap;gap:0"></div>
      </div>

      <div class="form-group">
        <label>Altro <span style="font-weight:400;opacity:0.6">(opzionale, solo per questo turno)</span></label>
        <input type="text" id="modal-custom-text" placeholder="Es: Formazione, Ferie, Malattia..." autocomplete="off">
      </div>

      <div class="time-pickers-grid">
        <div class="form-group">
          <label>Inizio</label>
          <div class="tp" id="tp-start"></div>
          <input type="hidden" id="modal-time-start">
        </div>
        <div class="form-group">
          <label>Fine</label>
          <div class="tp" id="tp-end"></div>
          <input type="hidden" id="modal-time-end">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-danger" id="modal-delete-btn" style="margin-right:auto">Elimina</button>
        <button class="btn btn-ghost" id="modal-cancel-btn">Annulla</button>
        <button class="btn btn-primary" id="modal-save-btn">Salva</button>
      </div>
    </div>
  </div>

  <script src="./app.js?v=14"></script>
</body>
</html>
